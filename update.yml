name: Converted SMAdHosts to AdGuard Home

on:
  schedule:
    - cron: '0 23 * * *' # 每天北京时间早上 7 点自动运行一次
  workflow_dispatch: # 允许手动点击按钮触发更新

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Convert Hosts
        run: |
          echo "正在下载原始文件..."
          curl -sSL "https://raw.githubusercontent.com/2Gardon/SM-Ad-FuckU-hosts/refs/heads/master/SMAdHosts" -o raw_hosts.txt
          
          echo "正在转换格式并过滤白名单..."
          echo "! Title: SMAdHosts-ADG (Safe Filtered)" > adg_rules.txt
          echo "! Homepage: https://github.com/${{ github.repository }}" >> adg_rules.txt
          echo "! Source: https://raw.githubusercontent.com/2Gardon/SM-Ad-FuckU-hosts/refs/heads/master/SMAdHosts" >> adg_rules.txt
          echo "! Expires: 24 Hours" >> adg_rules.txt
          echo "!" >> adg_rules.txt
          
          # 核心过滤与转换逻辑
          awk '
          # 1. 转换注释
          /^[[:space:]]*#/ { print "!" substr($0, index($0, "#")+1); next }
          /^[[:space:]]*$/ { print ""; next }
          
          {
            # 2. 严格限制：只处理以本地回环 IP (127.0.0.1 或 0.0.0.0) 开头的行
            # 从而完美跳过类似 108.177.125.188 mtalk.google.com 等所有公网 IP 加速行
            if ($1 == "127.0.0.1" || $1 == "0.0.0.0") {
              for (i=2; i<=NF; i++) {
                domain = $i
                
                # 移除行尾可能存在的带 # 号的注释
                sub(/#.*/, "", domain)
                
                if (domain != "") {
                  # 将域名转为小写以便匹配
                  lower_domain = tolower(domain)
                  
                  # 3. 显式白名单过滤：含有以下关键字的域名，一律不转为拦截规则
                  if (lower_domain ~ /localhost/ || 
                      lower_domain ~ /github/ || 
                      lower_domain ~ /google/ || 
                      lower_domain ~ /gitee/ || 
                      lower_domain ~ /apple/ || 
                      lower_domain ~ /^::1/) {
                    continue
                  }
                  
                  print "||" domain "^"
                }
                if (index($i, "#") == 1) break
              }
            }
          }' raw_hosts.txt >> adg_rules.txt
          
          # 清理临时文件
          rm raw_hosts.txt
          echo "转换与净化完成！"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add adg_rules.txt
          if git diff --staged --quiet; then
            echo "规则没有变化，跳过提交。"
          else
            git commit -m "自动更新并过滤规则 ($(date +'%Y-%m-%d %H:%M:%S'))"
            git push
          fi
          
