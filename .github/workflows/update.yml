name: Converted SMAdHosts to Pure AdGuard Home Rules

on:
  schedule:
    - cron: '0 23 * * *' # 每天北京时间早上 7 点自动运行一次
  workflow_dispatch: # 允许手动点击按钮触发更新

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Fetch and Clean Rules
        run: |
          echo "正在下载原始文件..."
          curl -sSL "https://raw.githubusercontent.com/2Gardon/SM-Ad-FuckU-hosts/refs/heads/master/SMAdHosts" -o raw_hosts.txt
          
          echo "正在进行绝对纯净化清洗..."
          # 创建一个完全空白的规则文件
          > adg_rules.txt
          
          # 核心过滤：不保留任何注释行、空白行，只输出 ||domain^
          awk '
          # 1. 忽略原文件中的所有注释行和空行
          /^[[:space:]]*#/ { next }
          /^[[:space:]]*!/ { next }
          /^[[:space:]]*$/ { next }
          
          {
            # 2. 只处理以本地回环 IP 开头的行
            if ($1 == "127.0.0.1" || $1 == "0.0.0.0") {
              for (i=2; i<=NF; i++) {
                domain = $i
                
                # 移除行尾可能存在的带 # 号的注释
                sub(/#.*/, "", domain)
                
                if (domain != "") {
                  lower_domain = tolower(domain)
                  
                  # 3. 排除白名单（防止断网和推送失效）
                  if (lower_domain ~ /localhost/ || 
                      lower_domain ~ /github/ || 
                      lower_domain ~ /google/ || 
                      lower_domain ~ /gitee/ || 
                      lower_domain ~ /apple/ || 
                      lower_domain ~ /^::1/) {
                    continue
                  }
                  
                  # 4. 只输出标准的 ADG 识别格式
                  print "||" domain "^"
                }
                if (index($i, "#") == 1) break
              }
            }
          }' raw_hosts.txt >> adg_rules.txt
          
          rm raw_hosts.txt
          echo "绝对纯净化清洗完成！"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add adg_rules.txt
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交。"
          else
            git commit -m "自动更新绝对纯净规则 ($(date +'%Y-%m-%d %H:%M:%S'))"
            git push
          fi
