name: Converted SMAdHosts to Pure AdGuard Home Rules

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Fetch, Merge and Clean Rules
        run: |
          curl -sSL "https://raw.githubusercontent.com/2Gardon/SM-Ad-FuckU-hosts/refs/heads/master/SMAdHosts" -o source1.txt
          curl -sSL "https://gcore.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockdns.txt" -o source2.txt
          curl -sSL "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-easylist.txt" -o source3.txt
          
          > adg_rules.txt
          
          awk '
          /^[[:space:]]*#/ { next }
          /^[[:space:]]*!/ { next }
          /^[[:space:]]*$/ { next }
          
          FILENAME == "source1.txt" {
            if ($1 == "127.0.0.1" || $1 == "0.0.0.0") {
              domain = $2
              sub(/#.*/, "", domain)
              sub(/[[:space:]]+$/, "", domain)
              sub(/^[[:space:]]+/, "", domain)
              
              if (domain != "") {
                lower_domain = tolower(domain)
                
                if (lower_domain ~ /localhost/ || 
                    lower_domain ~ /github/ || 
                    lower_domain ~ /google/ || 
                    lower_domain ~ /gitee/ || 
                    lower_domain ~ /apple/ || 
                    lower_domain ~ /^::1/) {
                  next
                }
                
                if (!(domain in seen)) {
                  seen[domain] = 1
                  print "||" domain "^"
                }
              }
            }
            next
          }
          
          {
            domain = ""
            if ($0 ~ /^\|\|.+\^/) {
              match($0, /^\|\|([^^\$]+)\^/, arr)
              if (arr[1] != "") domain = arr[1]
            } else {
              domain = $0
              sub(/[[:space:]]+$/, "", domain)
              sub(/^[[:space:]]+/, "", domain)
            }
            
            if (domain != "") {
              if (!(domain in seen)) {
                seen[domain] = 1
                print "||" domain "^"
              }
            }
          }
          ' source1.txt source2.txt source3.txt >> adg_rules.txt
          
          rm source1.txt source2.txt source3.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add adg_rules.txt
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Automated update"
            git push
          fi
